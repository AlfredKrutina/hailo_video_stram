worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  upstream web_backend {
    server web:8080;
  }

  upstream mjpeg_backend {
    server ai_core:8081;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    location /health {
      proxy_pass http://web_backend/health;
      proxy_http_version 1.1;
    }

    # MJPEG musí jít na ai_core:8081, ne na web — jinak 502 / useknutý chunked stream.
    # Některé klienty volají omylem /api/stream_mjpeg (trefí se do location /api/ → web).
    location = /api/stream_mjpeg {
      proxy_pass http://mjpeg_backend/stream.mjpeg;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_connect_timeout 75s;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /video/stream.mjpeg {
      proxy_pass http://mjpeg_backend/stream.mjpeg;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_connect_timeout 75s;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /stream.mjpeg {
      proxy_pass http://mjpeg_backend/stream.mjpeg;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_connect_timeout 75s;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /api/ {
      proxy_pass http://web_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
      proxy_pass http://web_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    location /mjpeg/ {
      proxy_pass http://mjpeg_backend/;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_connect_timeout 75s;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location / {
      proxy_pass http://web_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
  }
}
