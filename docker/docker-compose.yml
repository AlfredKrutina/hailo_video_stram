# Volitelný limit paměti pro yt-dlp na Pi: docker compose -f docker-compose.yml -f docker-compose.youtube-dev.yml up -d
# Viz docs/YOUTUBE_PI_LIMITS.md
#
# Porty: uživatel → nginx :80 → web :8080. ai_core vystavuje video WS na :8081 jen uvnitř Docker sítě
# (RPY_AI_CORE_VIDEO_WS_URL=ws://ai_core:8081/ws/video); na hosta neexportovat bez nutnosti ladění.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rpy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rpy}
      POSTGRES_DB: ${POSTGRES_DB:-rpy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpy -d rpy"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai_core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
      args:
        INSTALL_ONNX: ${INSTALL_ONNX:-0}
    restart: unless-stopped
    privileged: true
    devices:
      - ${RPY_HAILO_DEVICE:-/dev/hailo0}:${RPY_HAILO_DEVICE:-/dev/hailo0}
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-staging}
      REDIS_URL: redis://redis:6379/0
      RPY_CONFIG: /app/config/default.yaml
      # Na Raspberry Pi použijte nejdřív vestavěné demo MP4, RTSP nebo v4l2:///dev/video0 — YouTube je křehké.
      SOURCE_URI: ${SOURCE_URI:-file:///opt/rpy/assets/sample.mp4}
      # RTSP z Dockeru: TCP často nutné (UDP kamera/LAN). Vypnout: RPY_RTSP_FORCE_TCP=0
      RPY_RTSP_FORCE_TCP: ${RPY_RTSP_FORCE_TCP:-1}
      RPY_RTSP_LATENCY_MS: ${RPY_RTSP_LATENCY_MS:-300}
      # Volitelně: vlastní výběr formátu pro yt-dlp -o - (YouTube pipe)
      # RPY_YTDLP_FORMAT: "best[height<=720][ext=mp4]/best/worst"
      # Staging: stderr yt-dlp do logu (vypnout: RPY_YTDLP_LOG_STDERR=0)
      # RPY_YTDLP_LOG_STDERR: "1"
      # Fronta před decodebin (MB, výchozí 12) — na Pi nepřehánět (OOM → 502)
      # RPY_YTDLP_QUEUE_MB: "12"
      # RPY_USE_DECODEBIN3: "0" — výchozí decodebin; 1 = zkusit decodebin3
      # yt-dlp | ffmpeg → MPEG-TS (výchozí zapnuto) — lepší typefind než surový stdout z yt-dlp
      # RPY_YTDLP_FFMPEG_TS: "0" — vypnout remux, jen yt-dlp -o -
      # Inference: stub | onnx | hailo (prázdné = legacy USE_HAILO)
      # RPY_INFER_BACKEND: "onnx"
      # RPY_ONNX_MODEL_PATH: "/models/yolov8n.onnx"
      # Hailo GStreamer (TAPPAS): hailonet + volitelně RPY_HAILO_GST_BIN_DESCRIPTION (Gst.parse_bin_from_description)
      # RPY_HAILO_HEF_STAGE1: "/models/yolov8m_h10.hef"
      # RPY_HAILO_HEF_LPR: "/models/lprnet.hef"
      # RPY_HAILO_HEF_VCOLOR: "/models/vehicle_color.hef"
      # RPY_HAILO_HEF_VATTR: "/models/vehicle_attr.hef"
      # RPY_HAILO_HEF_PATTR: "/models/pedestrian_attr.hef"
      # Volitelný sysfs reset PCI Hailo (např. /sys/bus/pci/devices/0000:01:00.0/reset)
      # RPY_HAILO_PCI_RESET_PATH: "/sys/bus/pci/devices/0000:01:00.0/reset"
      # RPY_HAILO_GST_BIN_DESCRIPTION: 'queue ! videoconvert ! ...'
      # Pi HW dekód hint (telemetrie + viz docs/RTSP_PI.md):
      # RPY_GST_PREFER_V4L2_H264: "1"
      # GST_PLUGIN_FEATURE_RANK: "v4l2h264dec:MAX"
      USE_HAILO: ${USE_HAILO:-1}
      # Volitelný sysfs reset PCI (viz komentář výše u RPY_HAILO_PCI_RESET_PATH)
      RPY_HAILO_PCI_RESET_PATH: ${RPY_HAILO_PCI_RESET_PATH:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rpy:rpy@postgres:5432/rpy}
    volumes:
      - ../config:/app/config:ro
      - snapshots:/data/snapshots
      # Volitelně HEF modely z hosta: - ../models:/models:ro
      # Volitelně vlastní videa: odkomentujte a vložte např. sample.mp4 do ./samples/
      # - ../samples:/data/samples:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-staging}
      RPY_AI_CORE_VIDEO_WS_URL: ${RPY_AI_CORE_VIDEO_WS_URL:-ws://ai_core:8081/ws/video}
      REDIS_URL: redis://redis:6379/0
      SNAPSHOT_DIR: /data/snapshots
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rpy:rpy@postgres:5432/rpy}
    volumes:
      - snapshots:/data/snapshots
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=6); raise SystemExit(0 if r.status == 200 else 1)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      ai_core:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  watchdog:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      - redis
      - ai_core
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../scripts/watchdog.sh:/watchdog.sh:ro
    entrypoint: ["/bin/sh", "/watchdog.sh"]

volumes:
  snapshots:
  pgdata:
