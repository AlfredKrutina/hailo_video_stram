services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rpy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rpy}
      POSTGRES_DB: ${POSTGRES_DB:-rpy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpy -d rpy"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai_core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/hailo0:/dev/hailo0
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-staging}
      REDIS_URL: redis://redis:6379/0
      RPY_CONFIG: /app/config/default.yaml
      SOURCE_URI: ${SOURCE_URI:-file:///opt/rpy/assets/sample.mp4}
      # RTSP z Dockeru: TCP často nutné (UDP kamera/LAN). Vypnout: RPY_RTSP_FORCE_TCP=0
      RPY_RTSP_FORCE_TCP: ${RPY_RTSP_FORCE_TCP:-1}
      RPY_RTSP_LATENCY_MS: ${RPY_RTSP_LATENCY_MS:-300}
      # Volitelně: vlastní výběr formátu pro yt-dlp -o - (YouTube pipe)
      # RPY_YTDLP_FORMAT: "best[height<=720][ext=mp4]/best/worst"
      # Fronta před decodebin (MB, výchozí 12) — na Pi nepřehánět (OOM → 502)
      # RPY_YTDLP_QUEUE_MB: "12"
      # RPY_USE_DECODEBIN3: "0" — výchozí decodebin; 1 = zkusit decodebin3
      USE_HAILO: ${USE_HAILO:-1}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rpy:rpy@postgres:5432/rpy}
    volumes:
      - ../config:/app/config:ro
      - snapshots:/data/snapshots
      # Volitelně vlastní videa: odkomentujte a vložte např. sample.mp4 do ./samples/
      # - ../samples:/data/samples:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-staging}
      RPY_AI_CORE_MJPEG_URL: ${RPY_AI_CORE_MJPEG_URL:-http://ai_core:8081/stream.mjpeg}
      REDIS_URL: redis://redis:6379/0
      SNAPSHOT_DIR: /data/snapshots
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rpy:rpy@postgres:5432/rpy}
    volumes:
      - snapshots:/data/snapshots
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - web
      - ai_core
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  watchdog:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      - redis
      - ai_core
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../scripts/watchdog.sh:/watchdog.sh:ro
    entrypoint: ["/bin/sh", "/watchdog.sh"]

volumes:
  snapshots:
  pgdata:
