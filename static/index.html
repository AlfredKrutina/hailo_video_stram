<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hailo stream</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    #c { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: fixed; top: 8px; left: 8px;
      font: 13px/1.4 system-ui, sans-serif;
      color: #e8e8e8;
      text-shadow: 0 0 4px #000, 0 0 8px #000;
      pointer-events: none;
      max-width: 90vw;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud"></div>
  <script>
(function () {
  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var hud = document.getElementById("hud");

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  var pendingMeta = null;
  var fpsFrames = 0;
  var fpsLast = performance.now();
  var fpsShow = 0;

  var COCO = [
    "person","bicycle","car","motorcycle","airplane","bus","train","truck","boat","traffic light",
    "fire hydrant","stop sign","parking meter","bench","bird","cat","dog","horse","sheep","cow",
    "elephant","bear","zebra","giraffe","backpack","umbrella","handbag","tie","suitcase","frisbee",
    "skis","snowboard","sports ball","kite","baseball bat","baseball glove","skateboard","surfboard",
    "tennis racket","bottle","wine glass","cup","fork","knife","spoon","bowl","banana","apple",
    "sandwich","orange","broccoli","carrot","hot dog","pizza","donut","cake","chair","couch",
    "potted plant","bed","dining table","toilet","tv","laptop","mouse","remote","keyboard","cell phone",
    "microwave","oven","toaster","sink","refrigerator","book","clock","vase","scissors","teddy bear",
    "hair drier","toothbrush"
  ];

  function labelFor(d) {
    var c = d["class"];
    if (typeof c === "number" && COCO[c] != null) return COCO[c];
    return String(c);
  }

  function colorFor(str) {
    var h = 0;
    var s = String(str);
    for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    return "hsl(" + (h % 360) + ", 85%, 55%)";
  }

  function drawDetections(dets) {
    if (!dets || !dets.length) return;
    var cw = canvas.width;
    var ch = canvas.height;
    for (var i = 0; i < dets.length; i++) {
      var d = dets[i];
      var bb = d.bbox;
      if (!bb || bb.length < 4) continue;
      var x = bb[0] * cw;
      var y = bb[1] * ch;
      var w = bb[2] * cw;
      var h = bb[3] * ch;
      var lab = labelFor(d);
      var conf = (d.confidence != null ? d.confidence : 0);
      var pct = Math.round(conf * 1000) / 10;
      var col = colorFor(lab);
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);
      var text = lab + " " + pct + "%";
      ctx.font = "14px system-ui, sans-serif";
      var tw = ctx.measureText(text).width;
      ctx.fillStyle = col;
      ctx.fillRect(x, Math.max(0, y - 20), tw + 8, 20);
      ctx.fillStyle = "#111";
      ctx.fillText(text, x + 4, y - 5);
    }
  }

  var proto = location.protocol === "https:" ? "wss:" : "ws:";
  var ws = new WebSocket(proto + "//" + location.host + "/ws");

  ws.binaryType = "arraybuffer";

  ws.onmessage = function (ev) {
    if (typeof ev.data === "string") {
      try {
        pendingMeta = JSON.parse(ev.data);
      } catch (e) {
        pendingMeta = null;
      }
      return;
    }
    var meta = pendingMeta;
    pendingMeta = null;
    if (!meta) return;

    var blob = new Blob([ev.data], { type: "image/jpeg" });
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function () {
      URL.revokeObjectURL(url);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      drawDetections(meta.detections);
      fpsFrames++;
      var now = performance.now();
      if (now - fpsLast >= 1000) {
        fpsShow = fpsFrames / ((now - fpsLast) / 1000);
        fpsFrames = 0;
        fpsLast = now;
      }
      var src = meta.source != null ? meta.source : "";
      hud.textContent = "FPS " + fpsShow.toFixed(1) + " | " + src;
    };
    img.onerror = function () {
      URL.revokeObjectURL(url);
    };
    img.src = url;
  };

  ws.onopen = function () {
    setInterval(function () {
      if (ws.readyState === WebSocket.OPEN) ws.send("ping");
    }, 15000);
  };

  ws.onclose = function () {
    hud.textContent = "WebSocket closed — refresh page";
  };
})();
  </script>
</body>
</html>
