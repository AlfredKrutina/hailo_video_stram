redis_url: "redis://redis:6379/0"
snapshot_dir: "/data/snapshots"
mjpeg_port: 8081
heartbeat_interval_s: 2.0
use_hailo: true
model:
  confidence_threshold: 0.45
  iou_threshold: 0.45
source:
  # V Docker image je po buildu /opt/rpy/assets/sample.mp4 — spolehlivější než veřejné Google demo URL (403 u GStreamer).
  uri: "file:///opt/rpy/assets/sample.mp4"
  label: "Demo soubor v image"
